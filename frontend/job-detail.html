<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Job Details - Job Portal</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/mobile-responsive.css">
<link rel="stylesheet" href="assets/css/portal.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="assets/js/email-notifications.js"></script>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo"><div class="logo-icon">JP</div>Job Portal</a>
    <ul class="nav-links" id="guest-nav">
      <li><a href="jobs.html">Browse Jobs</a></li>
      <li><a href="login.html" class="btn btn-secondary">Login</a></li>
      <li><a href="register.html" class="btn btn-primary">Register</a></li>
    </ul>
    <ul class="nav-links" id="logged-nav" style="display:none">
      <li><a href="jobs.html">Browse Jobs</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><span id="user-name" style="color:#2563eb;font-weight:600;"></span></li>
      <li><a href="#" id="logout-btn" class="btn btn-secondary">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="page-content" style="margin-top:2rem;">
  <a href="jobs.html" style="color:#2563eb;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;margin-bottom:1.5rem;">
    ← Back to Jobs
  </a>
  <div id="job-content">
    <div class="skeleton" style="height:400px;border-radius:14px;"></div>
  </div>
</div>

<!-- APPLY MODAL -->
<div id="apply-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>Apply for this Job</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <p style="color:#6b7280;margin-bottom:1.5rem;">Write a brief cover letter explaining why you're the best candidate.</p>
    <div class="form-group">
      <label for="cover-letter">Cover Letter <span style="color:#9ca3af;">(optional)</span></label>
      <textarea id="cover-letter" class="form-control" rows="6" placeholder="Dear Hiring Manager, I am excited to apply for this position because…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="submit-apply-btn" onclick="submitApplication()">Submit Application</button>
    </div>
  </div>
</div>

<footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 Job Portal</p></div></div></footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
const jobId  = new URLSearchParams(location.search).get('id');
const user   = Auth.get();
let   currentJob = null;

async function loadJob() {
  if (!jobId) { document.getElementById('job-content').innerHTML = '<p>Invalid job ID</p>'; return; }
  const result = await API.getJob(jobId);
  if (!result.success) { document.getElementById('job-content').innerHTML = `<p>${result.error}</p>`; return; }

  currentJob = result.job;
  document.title = currentJob.job_title + ' - Job Portal';

  // Check if already applied
  let applyHTML = '';
  if (user && user.user_type === 'job_seeker') {
    const check = await API.checkApplied(jobId);
    if (check.applied) {
      applyHTML = `<div style="padding:1rem;background:#d1fae5;border-radius:8px;color:#065f46;font-weight:600;text-align:center;">
        ✅ You applied for this job · Status: ${check.status}</div>`;
    } else {
      applyHTML = `<button class="btn btn-primary" style="width:100%;font-size:1rem;padding:1rem;" onclick="openModal()">Apply Now</button>`;
    }
  } else if (!user) {
    applyHTML = `<a href="login.html" class="btn btn-primary" style="display:block;text-align:center;font-size:1rem;padding:1rem;">Login to Apply</a>`;
  }

  document.getElementById('job-content').innerHTML = `
    <div class="job-detail-layout">
      <div class="job-detail-main">
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1rem;">
          ${UI.jobTypeBadge(currentJob.job_type)}
        </div>
        <div class="job-detail-title">${currentJob.job_title}</div>
        <div class="job-detail-company">${currentJob.company_name || currentJob.employer_name}</div>

        <div class="job-card-meta" style="margin-bottom:0;">
          <span>📍 ${currentJob.location}</span>
          <span>💰 ${UI.formatSalary(currentJob.salary_min, currentJob.salary_max)}</span>
          <span>📅 Posted ${UI.formatDate(currentJob.created_at)}</span>
          <span>👥 ${currentJob.application_count} applicant${currentJob.application_count!=1?'s':''}</span>
        </div>

        <div class="job-detail-section">
          <h3>Job Description</h3>
          <p>${currentJob.job_description.replace(/\n/g,'<br>')}</p>
        </div>

        ${currentJob.responsibilities ? `
        <div class="job-detail-section">
          <h3>Responsibilities</h3>
          <p>${currentJob.responsibilities.replace(/\n/g,'<br>')}</p>
        </div>` : ''}

        ${currentJob.qualifications ? `
        <div class="job-detail-section">
          <h3>Qualifications</h3>
          <p>${currentJob.qualifications.replace(/\n/g,'<br>')}</p>
        </div>` : ''}
      </div>

      <div class="job-detail-aside">
        <div class="card" style="margin-bottom:1.5rem;">
          <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:1rem;color:#374151;">About Company</h3>
          <p style="font-weight:700;color:#1f2937;margin-bottom:0.25rem;">${currentJob.company_name || 'Company'}</p>
          ${currentJob.industry ? `<p style="color:#6b7280;font-size:0.9rem;">🏢 ${currentJob.industry}</p>` : ''}
          ${currentJob.company_description ? `<p style="color:#6b7280;font-size:0.9rem;margin-top:0.5rem;">${currentJob.company_description.substring(0,150)}…</p>` : ''}
          ${currentJob.company_website ? `<a href="${currentJob.company_website}" target="_blank" style="color:#2563eb;font-size:0.9rem;font-weight:600;">Visit Website →</a>` : ''}
        </div>

        <div class="card">
          <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:1rem;color:#374151;">Job Summary</h3>
          <table style="width:100%;font-size:0.9rem;">
            <tr><td style="color:#6b7280;padding:0.4rem 0;">Salary</td><td style="font-weight:600;color:#10b981;">${UI.formatSalary(currentJob.salary_min, currentJob.salary_max)}</td></tr>
            <tr><td style="color:#6b7280;padding:0.4rem 0;">Type</td><td>${currentJob.job_type.replace('_',' ')}</td></tr>
            <tr><td style="color:#6b7280;padding:0.4rem 0;">Location</td><td>${currentJob.location}</td></tr>
          </table>
          <div style="margin-top:1.25rem;">${applyHTML}</div>
        </div>
      </div>
    </div>`;
}

function openModal()  { document.getElementById('apply-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('apply-modal').style.display = 'none'; }

async function submitApplication() {
  UI.setLoading('submit-apply-btn', true);
  const coverLetter = document.getElementById('cover-letter').value.trim();
  const result = await API.applyForJob(jobId, { cover_letter: coverLetter });
  UI.setLoading('submit-apply-btn', false);

  if (result.success) {
    closeModal();
    UI.toast('Application submitted successfully! 🎉', 'success');
    loadJob(); // refresh to show applied state
  } else {
    UI.toast(result.error || 'Failed to apply', 'error');
  }
}

loadJob();
</script>
</body>
</html>
