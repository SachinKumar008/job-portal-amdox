<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Job Portal</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">JP</div>
                Job Portal
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html" class="btn btn-secondary">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- REGISTRATION FORM -->
    <div class="form-container">
        <div class="form-header">
            <h2>Create Your Account</h2>
            <p>Join thousands of users finding their perfect match</p>
        </div>

        <div id="message-container"></div>

        <form id="registration-form">
            <!-- User Type -->
            <div class="form-group">
                <label for="user_type">I am a *</label>
                <select id="user_type" name="user_type" class="form-control form-select" required>
                    <option value="">Select user type</option>
                    <option value="job_seeker">Job Seeker</option>
                    <option value="employer">Employer</option>
                </select>
                <div id="user_type-error" class="error-message"></div>
            </div>

            <!-- Full Name -->
            <div class="form-group">
                <label for="full_name">Full Name *</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Enter your full name" required>
                <div id="full_name-error" class="error-message"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="your.email@example.com" required>
                <div id="email-error" class="error-message"></div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" placeholder="+1 (555) 000-0000">
                <div id="phone-error" class="error-message"></div>
            </div>

            <!-- Company Name (for employers) -->
            <div id="company-field" class="form-group hidden">
                <label for="company_name">Company Name *</label>
                <input type="text" id="company_name" name="company_name" class="form-control" placeholder="Your company name">
                <div id="company_name-error" class="error-message"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="At least 8 characters" required>
                <div id="password-error" class="error-message"></div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirm_password">Confirm Password *</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter your password" required>
                <div id="confirm_password-error" class="error-message"></div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="register-btn" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                Create Account
            </button>

            <!-- Login Link -->
            <p class="text-center mt-3" style="color: var(--text-secondary);">
                Already have an account? 
                <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Login here</a>
            </p>
        </form>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Job Portal - AMDOX Internship Project</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        // Pre-select user type from URL
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const userType = urlParams.get('type');
            if (userType && (userType === 'job_seeker' || userType === 'employer')) {
                document.getElementById('user_type').value = userType;
                document.getElementById('user_type').dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
