<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Job Portal</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/mobile-responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .msg-success { background:#10b981; color:white; padding:1rem; border-radius:8px; margin-bottom:1rem; font-weight:600; }
  .msg-error   { background:#fee2e2; color:#991b1b; padding:1rem; border-radius:8px; margin-bottom:1rem; border:1px solid #fca5a5; line-height:1.6; }
  .field-error { color:#ef4444; font-size:.85rem; margin-top:.25rem; display:none; }
  .field-error.show { display:block; }
  input.error, select.error { border-color:#ef4444 !important; }
  code { background:#f3f4f6; padding:.1rem .35rem; border-radius:4px; font-size:.88rem; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo"><div class="logo-icon">JP</div>Job Portal</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html" class="btn btn-secondary">Login</a></li>
    </ul>
  </div>
</nav>

<div class="form-container">
  <div class="form-header">
    <h2>Create Your Account</h2>
    <p>Join thousands of users finding their perfect match</p>
  </div>

  <div id="msg-box"></div>

  <form id="reg-form">
    <div class="form-group">
      <label for="user_type">I am a *</label>
      <select id="user_type" class="form-control form-select" required>
        <option value="">Select user type</option>
        <option value="job_seeker">Job Seeker</option>
        <option value="employer">Employer</option>
      </select>
      <div class="field-error" id="user_type-err"></div>
    </div>

    <div class="form-group">
      <label for="full_name">Full Name *</label>
      <input type="text" id="full_name" class="form-control" placeholder="Enter your full name" required>
      <div class="field-error" id="full_name-err"></div>
    </div>

    <div class="form-group">
      <label for="email">Email Address *</label>
      <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
      <div class="field-error" id="email-err"></div>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210">
    </div>

    <div class="form-group hidden" id="company-field">
      <label for="company_name">Company Name *</label>
      <input type="text" id="company_name" class="form-control" placeholder="Your company name">
      <div class="field-error" id="company_name-err"></div>
    </div>

    <div class="form-group">
      <label for="password">Password *</label>
      <input type="password" id="password" class="form-control" placeholder="At least 8 characters" required>
      <div class="field-error" id="password-err"></div>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm Password *</label>
      <input type="password" id="confirm_password" class="form-control" placeholder="Re-enter password" required>
      <div class="field-error" id="confirm_password-err"></div>
    </div>

    <button type="submit" id="reg-btn" class="btn btn-primary" style="width:100%;margin-top:1.5rem;">Create Account</button>

    <p class="text-center mt-3" style="color:var(--text-secondary);">
      Already have an account?
      <a href="login.html" style="color:var(--primary-color);text-decoration:none;font-weight:600;">Login here</a>
    </p>
  </form>
</div>

<footer class="footer"><div class="container"><div class="footer-bottom">
  <p>&copy; 2026 Job Portal - AMDOX Internship Project</p>
</div></div></footer>

<!-- config.js MUST be first — it sets window.API_BASE automatically -->
<script src="assets/js/config.js"></script>
<script>
// Show/hide company field
document.getElementById('user_type').addEventListener('change', function() {
  const cf = document.getElementById('company-field');
  this.value === 'employer' ? cf.classList.remove('hidden') : cf.classList.add('hidden');
  if (this.value !== 'employer') {
    document.getElementById('company_name').value = '';
    clearFieldErr('company_name');
  }
});

// Pre-select from URL
window.addEventListener('DOMContentLoaded', () => {
  const t = new URLSearchParams(location.search).get('type');
  if (t === 'job_seeker' || t === 'employer') {
    document.getElementById('user_type').value = t;
    document.getElementById('user_type').dispatchEvent(new Event('change'));
  }
});

// Real-time password match
document.getElementById('confirm_password').addEventListener('input', function() {
  const pw = document.getElementById('password').value;
  if (this.value && this.value !== pw) showFieldErr('confirm_password', 'Passwords do not match');
  else clearFieldErr('confirm_password');
});

document.getElementById('reg-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearAll();

  const userType    = document.getElementById('user_type').value;
  const fullName    = document.getElementById('full_name').value.trim();
  const email       = document.getElementById('email').value.trim();
  const phone       = document.getElementById('phone').value.trim();
  const companyName = document.getElementById('company_name').value.trim();
  const password    = document.getElementById('password').value;
  const confirmPw   = document.getElementById('confirm_password').value;

  let ok = true;
  if (!userType)                { showFieldErr('user_type', 'Please select a user type'); ok = false; }
  if (!fullName || fullName.length < 3) { showFieldErr('full_name', 'Full name must be at least 3 characters'); ok = false; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldErr('email', 'Valid email required'); ok = false; }
  if (!password || password.length < 8) { showFieldErr('password', 'Password must be at least 8 characters'); ok = false; }
  if (password !== confirmPw)   { showFieldErr('confirm_password', 'Passwords do not match'); ok = false; }
  if (userType === 'employer' && !companyName) { showFieldErr('company_name', 'Company name is required'); ok = false; }
  if (!ok) return;

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  const payload = { user_type: userType, full_name: fullName, email, phone, password, confirm_password: confirmPw };
  if (userType === 'employer') payload.company_name = companyName;

  const regUrl = window.API_BASE + '/auth/register.php';
  console.log('POST →', regUrl);

  try {
    const response = await fetch(regUrl, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body:    JSON.stringify(payload)
    });

    const text = await response.text();
    console.log('Raw response:', text);

    let data;
    try { data = JSON.parse(text); }
    catch (_) {
      showMsg('Server error — unexpected response:<br><code>' + escHtml(text.substring(0, 400)) + '</code>', true);
      btn.disabled = false; btn.textContent = 'Create Account';
      return;
    }

    if (data.success) {
      showMsg('✅ Registration successful! Redirecting to login…', false);
      document.getElementById('reg-form').reset();
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
      if (data.errors && typeof data.errors === 'object') {
        for (const [field, msg] of Object.entries(data.errors)) {
          if (field === 'general') showMsg(msg, true);
          else showFieldErr(field, msg);
        }
      } else {
        showMsg(data.error || 'Registration failed. Please try again.', true);
      }
      btn.disabled = false; btn.textContent = 'Create Account';
    }

  } catch (err) {
    console.error('Fetch error:', err);
    const apiUrl = window.API_BASE + '/auth/register.php';
    showMsg(
      '<strong>⚠️ Cannot reach the server!</strong><br><br>' +
      'API URL tried: <code>' + apiUrl + '</code><br><br>' +
      '<strong>Your URL is:</strong> <code>' + window.location.href + '</code><br><br>' +
      (window.location.port === '8000'
        ? '👉 PHP server is not running!<br>Open CMD → <code>cd backend</code> → <code>php -S localhost:8000</code>'
        : '👉 Make sure XAMPP Apache + MySQL are both <strong>started (green)</strong>.'
      ),
      true
    );
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});

function showMsg(html, isError) {
  document.getElementById('msg-box').innerHTML =
    '<div class="' + (isError ? 'msg-error' : 'msg-success') + '">' + html + '</div>';
}
function showFieldErr(id, msg) {
  const el = document.getElementById(id + '-err');
  const inp = document.getElementById(id);
  if (el)  { el.textContent = msg; el.classList.add('show'); }
  if (inp) inp.classList.add('error');
}
function clearFieldErr(id) {
  const el  = document.getElementById(id + '-err');
  const inp = document.getElementById(id);
  if (el)  { el.textContent = ''; el.classList.remove('show'); }
  if (inp) inp.classList.remove('error');
}
function clearAll() {
  document.querySelectorAll('.field-error').forEach(e => { e.textContent = ''; e.classList.remove('show'); });
  document.querySelectorAll('input.error, select.error').forEach(e => e.classList.remove('error'));
  document.getElementById('msg-box').innerHTML = '';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
