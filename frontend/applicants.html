<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Applicants - Job Portal</title>
<link rel="stylesheet" href="assets/css/mobile-responsive.css">
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/portal.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .filters-bar{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.04);display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
  .filter-group{display:flex;align-items:center;gap:0.5rem}
  .filter-group label{font-size:0.9rem;font-weight:600;color:#4b5563}
  .filter-select{padding:0.5rem 2rem 0.5rem 0.75rem;border:1px solid #e5e7eb;border-radius:8px;font-size:0.9rem;cursor:pointer;background:#fff url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e") no-repeat right 0.5rem center/1.25rem}
  .bulk-actions{display:flex;gap:0.75rem;margin-left:auto}
  .action-bar{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
  .selected-count{font-size:0.9rem;color:#4b5563;font-weight:600}
  .checkbox-cell{width:40px;text-align:center}
  .checkbox-cell input[type="checkbox"]{width:18px;height:18px;cursor:pointer}
  @media(max-width:768px){.filters-bar{flex-direction:column}.bulk-actions{width:100%;margin-left:0}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="assets/js/email-notifications.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo"><div class="logo-icon">JP</div>Job Portal</a>
    <ul class="nav-links" id="guest-nav"><li><a href="login.html" class="btn btn-primary">Login</a></li></ul>
    <ul class="nav-links" id="logged-nav" style="display:none">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><span id="user-name" style="color:#2563eb;font-weight:600;"></span></li>
      <li><a href="#" id="logout-btn" class="btn btn-secondary">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1 id="page-title">Applicants</h1>
    <p id="page-sub">Manage candidates for this position</p>
  </div>
</div>

<div class="page-content">
  <a href="dashboard.html" style="color:#2563eb;font-weight:600;text-decoration:none;display:inline-block;margin-bottom:1.5rem;">← Back to Dashboard</a>

  <!-- Filters & Bulk Actions -->
  <div class="filters-bar" id="filters-bar" style="display:none;">
    <div class="filter-group">
      <label>Filter by Status:</label>
      <select class="filter-select" id="status-filter" onchange="filterApplicants()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="reviewing">Reviewing</option>
        <option value="accepted">Accepted</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Sort by:</label>
      <select class="filter-select" id="sort-filter" onchange="filterApplicants()">
        <option value="date_desc">Newest First</option>
        <option value="date_asc">Oldest First</option>
        <option value="name_asc">Name A-Z</option>
        <option value="experience_desc">Most Experience</option>
      </select>
    </div>
    <div class="bulk-actions">
      <button onclick="exportToCSV()" class="btn btn-secondary" style="padding:0.5rem 1rem;">📥 Export CSV</button>
      <button onclick="selectAll()" class="btn btn-secondary" style="padding:0.5rem 1rem;">☑ Select All</button>
    </div>
  </div>

  <!-- Bulk Action Bar (shows when items selected) -->
  <div class="action-bar" id="action-bar" style="display:none;">
    <span class="selected-count"><span id="selected-count">0</span> selected</span>
    <div style="display:flex;gap:0.5rem;">
      <button onclick="bulkUpdateStatus('reviewing')" class="btn btn-secondary" style="padding:0.4rem 0.9rem;font-size:0.9rem;">Mark as Reviewing</button>
      <button onclick="bulkUpdateStatus('accepted')" class="btn btn-primary" style="padding:0.4rem 0.9rem;font-size:0.9rem;">Accept</button>
      <button onclick="bulkUpdateStatus('rejected')" class="btn" style="padding:0.4rem 0.9rem;font-size:0.9rem;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;">Reject</button>
    </div>
  </div>

  <div class="section-card" id="applicants-container">
    <div class="skeleton" style="height:200px;border-radius:8px;"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-name">Applicant Details</h2>
      <button class="modal-close" onclick="document.getElementById('detail-modal').style.display='none'">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 Job Portal</p></div></div></footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
const user  = Auth.guard('employer');
const jobId = new URLSearchParams(location.search).get('job_id');

const pathParts = window.location.pathname.split('/').filter(p => p);
const projectFolder = pathParts[0];

function getResumeUrl(resumePath) {
  if (!resumePath) return null;
  return `/${projectFolder}/${resumePath}`;
}

let allApplicants = [];
let filteredApplicants = [];

async function loadApplicants() {
  if (!jobId) { 
    document.getElementById('applicants-container').innerHTML = '<p>No job selected</p>'; 
    return; 
  }

  const jobRes = await API.getJob(jobId);
  if (jobRes.success) {
    document.getElementById('page-title').textContent = `Applicants for: ${jobRes.job.job_title}`;
    document.getElementById('page-sub').textContent   = `${jobRes.job.application_count} total applicant${jobRes.job.application_count!=1?'s':''}`;
  }

  const result = await API.getApplicants(jobId);
  const container = document.getElementById('applicants-container');

  if (!result.success) { 
    container.innerHTML = `<p>${result.error}</p>`; 
    return; 
  }

  allApplicants = result.applicants || [];
  
  if (allApplicants.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:64px;height:64px;margin:0 auto 1rem;opacity:0.4">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <h3>No applicants yet</h3>
      <p>Share the job to get more visibility</p>
    </div>`;
    return;
  }

  document.getElementById('filters-bar').style.display = 'flex';
  filterApplicants();
}

function filterApplicants() {
  const statusFilter = document.getElementById('status-filter').value;
  const sortFilter = document.getElementById('sort-filter').value;

  // Filter
  filteredApplicants = allApplicants.filter(a => {
    if (statusFilter && a.status !== statusFilter) return false;
    return true;
  });

  // Sort
  filteredApplicants.sort((a, b) => {
    if (sortFilter === 'date_desc') return new Date(b.applied_at) - new Date(a.applied_at);
    if (sortFilter === 'date_asc') return new Date(a.applied_at) - new Date(b.applied_at);
    if (sortFilter === 'name_asc') return a.full_name.localeCompare(b.full_name);
    if (sortFilter === 'experience_desc') return (b.experience_years||0) - (a.experience_years||0);
    return 0;
  });

  renderApplicants();
}

function renderApplicants() {
  const container = document.getElementById('applicants-container');
  
  container.innerHTML = `
    <div class="section-card-header">
      <h2>${filteredApplicants.length} Applicant${filteredApplicants.length!==1?'s':''}</h2>
    </div>
    <div style="overflow-x:auto;">
    <table class="data-table">
      <thead><tr>
        <th class="checkbox-cell"><input type="checkbox" id="select-all-checkbox" onchange="toggleSelectAll()"></th>
        <th>Name</th><th>Email</th><th>Experience</th>
        <th>Skills</th><th>Resume</th><th>Applied</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody>
        ${filteredApplicants.map(a=>`<tr data-id="${a.application_id}">
          <td class="checkbox-cell"><input type="checkbox" class="applicant-checkbox" value="${a.application_id}" onchange="updateSelectedCount()"></td>
          <td><strong>${a.full_name}</strong></td>
          <td><a href="mailto:${a.email}" style="color:#2563eb;">${a.email}</a></td>
          <td>${a.experience_years ? a.experience_years+' yr'+(a.experience_years!=1?'s':''): '-'}</td>
          <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.skills||'-'}</td>
          <td>${a.resume_path ? `<a href="${getResumeUrl(a.resume_path)}" target="_blank" style="color:#2563eb;font-weight:600;text-decoration:none;">📄 Download</a>` : '<span style="color:#9ca3af;">No resume</span>'}</td>
          <td>${UI.formatDate(a.applied_at)}</td>
          <td>
            <select class="status-select" onchange="updateStatus(${a.application_id},this.value)" data-current="${a.status}">
              <option value="pending"   ${a.status==='pending'   ?'selected':''}>Pending</option>
              <option value="reviewing" ${a.status==='reviewing' ?'selected':''}>Reviewing</option>
              <option value="accepted"  ${a.status==='accepted'  ?'selected':''}>Accepted</option>
              <option value="rejected"  ${a.status==='rejected'  ?'selected':''}>Rejected</option>
            </select>
          </td>
          <td>
            <button onclick='showDetail(${JSON.stringify(a)})' class="btn btn-secondary" style="padding:0.35rem 0.75rem;font-size:0.85rem;">View</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

function toggleSelectAll() {
  const checked = document.getElementById('select-all-checkbox').checked;
  document.querySelectorAll('.applicant-checkbox').forEach(cb => cb.checked = checked);
  updateSelectedCount();
}

function selectAll() {
  document.getElementById('select-all-checkbox').checked = true;
  toggleSelectAll();
}

function updateSelectedCount() {
  const count = document.querySelectorAll('.applicant-checkbox:checked').length;
  document.getElementById('selected-count').textContent = count;
  document.getElementById('action-bar').style.display = count > 0 ? 'flex' : 'none';
}

async function bulkUpdateStatus(newStatus) {
  const selected = Array.from(document.querySelectorAll('.applicant-checkbox:checked')).map(cb => cb.value);
  if (selected.length === 0) return;

  if (!confirm(`Update ${selected.length} application(s) to "${newStatus}"?`)) return;

  UI.toast(`Updating ${selected.length} applications...`, 'info');

  for (const appId of selected) {
    await API.updateAppStatus(appId, newStatus);
  }

  UI.toast(`✅ ${selected.length} applications updated to ${newStatus}!`, 'success');
  loadApplicants();
}

async function updateStatus(appId, status) {
  const result = await API.updateAppStatus(appId, status);
  if (result.success) {
    UI.toast(`Status updated to ${status}! 📧 Notification sent.`, 'success');
    loadApplicants();
  } else {
    UI.toast(result.error, 'error');
  }
}

function showDetail(a) {
  document.getElementById('modal-name').textContent = a.full_name;
  document.getElementById('modal-body').innerHTML   = `
    <table style="width:100%;font-size:0.9rem;border-collapse:collapse;">
      <tr><td style="padding:.5rem 0;color:#6b7280;width:40%;">Email</td><td><a href="mailto:${a.email}" style="color:#2563eb;">${a.email}</a></td></tr>
      ${a.phone ? `<tr><td style="padding:.5rem 0;color:#6b7280;">Phone</td><td>${a.phone}</td></tr>` : ''}
      ${a.location ? `<tr><td style="padding:.5rem 0;color:#6b7280;">Location</td><td>${a.location}</td></tr>` : ''}
      ${a.education ? `<tr><td style="padding:.5rem 0;color:#6b7280;">Education</td><td>${a.education}</td></tr>` : ''}
      <tr><td style="padding:.5rem 0;color:#6b7280;">Experience</td><td>${a.experience_years||0} year(s)</td></tr>
      ${a.skills ? `<tr><td style="padding:.5rem 0;color:#6b7280;vertical-align:top;">Skills</td><td>${a.skills}</td></tr>` : ''}
      ${a.resume_path ? `<tr><td style="padding:.5rem 0;color:#6b7280;">Resume</td><td><a href="${getResumeUrl(a.resume_path)}" target="_blank" class="btn btn-primary" style="padding:0.4rem 1rem;font-size:0.85rem;display:inline-block;text-decoration:none;">📄 Download Resume</a></td></tr>` : ''}
      ${a.cover_letter ? `<tr><td style="padding:.5rem 0;color:#6b7280;vertical-align:top;">Cover Letter</td><td style="font-style:italic;background:#f9fafb;padding:0.75rem;border-radius:6px;margin-top:0.5rem;">"${a.cover_letter}"</td></tr>` : ''}
      <tr><td style="padding:.5rem 0;color:#6b7280;">Status</td><td>${UI.statusBadge(a.status)}</td></tr>
      <tr><td style="padding:.5rem 0;color:#6b7280;">Applied On</td><td>${UI.formatDate(a.applied_at)}</td></tr>
    </table>`;
  document.getElementById('detail-modal').style.display = 'flex';
}

function exportToCSV() {
  const csv = ['Name,Email,Phone,Experience,Skills,Status,Applied Date'];
  
  filteredApplicants.forEach(a => {
    csv.push([
      a.full_name,
      a.email,
      a.phone || '',
      (a.experience_years || 0) + ' years',
      (a.skills || '').replace(/,/g, ';'),
      a.status,
      UI.formatDate(a.applied_at)
    ].join(','));
  });

  const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `applicants_job_${jobId}_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
  
  UI.toast('✅ CSV exported successfully!', 'success');
}

loadApplicants();
</script>
</body>
</html>
