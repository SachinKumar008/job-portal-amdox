<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Profile - Job Portal</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/mobile-responsive.css">
<link rel="stylesheet" href="assets/css/portal.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .resume-upload { border: 2px dashed #e5e7eb; border-radius: 8px; padding: 1.5rem; text-align: center; background: #f9fafb; cursor: pointer; transition: .3s; }
  .resume-upload:hover { border-color: #2563eb; background: #eff6ff; }
  .resume-upload input { display: none; }
  .resume-filename { margin-top: 0.75rem; color: #2563eb; font-weight: 600; font-size: 0.9rem; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo"><div class="logo-icon">JP</div>Job Portal</a>
    <ul class="nav-links" id="guest-nav"><li><a href="login.html" class="btn btn-primary">Login</a></li></ul>
    <ul class="nav-links" id="logged-nav" style="display:none">
      <li><a href="jobs.html">Browse Jobs</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><span id="user-name" style="color:#2563eb;font-weight:600;"></span></li>
      <li><a href="#" id="logout-btn" class="btn btn-secondary">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>My Profile</h1>
    <p>Keep your profile updated to attract better opportunities</p>
  </div>
</div>

<div class="page-content">
  <!-- BACK BUTTON -->
  <a href="dashboard.html" style="color:#2563eb;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;margin-bottom:1.5rem;">
    ← Back to Dashboard
  </a>

  <div class="form-container-wide">
    <div class="profile-header">
      <div class="profile-avatar" id="avatar-initials">?</div>
      <div class="profile-info">
        <h2 id="profile-display-name">Loading…</h2>
        <p id="profile-email"></p>
        <p id="profile-joined" style="font-size:0.85rem;color:#9ca3af;"></p>
      </div>
    </div>

    <div id="profile-form-container">
      <div class="skeleton" style="height:400px;border-radius:8px;"></div>
    </div>
  </div>
</div>

<footer class="footer"><div class="container"><div class="footer-bottom">
  <p>&copy; 2026 Job Portal - AMDOX Internship Project</p>
</div></div></footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
const user = Auth.guard();

async function loadProfile() {
  const result = await API.getProfile();
  if (!result.success) { UI.toast(result.error, 'error'); return; }
  const p = result.profile;

  const initials = p.full_name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('avatar-initials').textContent = initials;
  document.getElementById('profile-display-name').textContent = p.full_name;
  document.getElementById('profile-email').textContent = p.email;
  document.getElementById('profile-joined').textContent = 'Member since ' + UI.formatDate(p.created_at);

  if (user.user_type === 'employer') renderEmployerForm(p);
  else renderJobSeekerForm(p);
}

function renderJobSeekerForm(p) {
  document.getElementById('profile-form-container').innerHTML = `
    <form id="profile-form">
      <h3 style="font-size:1rem;font-weight:700;color:#374151;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid #f1f5f9;">Personal Information</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="full_name" class="form-control" value="${p.full_name||''}" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" class="form-control" value="${p.phone||''}" placeholder="+91 …">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="location" class="form-control" value="${p.location||''}" placeholder="City, State">
        </div>
        <div class="form-group">
          <label>Years of Experience</label>
          <input type="number" id="experience_years" class="form-control" value="${p.experience_years||0}" min="0" max="50">
        </div>
      </div>
      <div class="form-group">
        <label>Education</label>
        <input type="text" id="education" class="form-control" value="${p.education||''}" placeholder="e.g. B.Tech Computer Science">
      </div>
      <div class="form-group">
        <label>Skills <span style="color:#9ca3af;">(comma separated)</span></label>
        <input type="text" id="skills" class="form-control" value="${p.skills||''}" placeholder="e.g. PHP, MySQL, HTML, CSS, JavaScript">
      </div>
      <div class="form-group">
        <label>Bio / About You</label>
        <textarea id="bio" class="form-control" rows="4" placeholder="Tell employers about yourself, your goals, and what makes you unique…">${p.bio||''}</textarea>
      </div>

      <!-- RESUME UPLOAD -->
      <div class="form-group">
        <label>Resume / CV</label>
        <div class="resume-upload" onclick="document.getElementById('resume').click()">
          <input type="file" id="resume" accept=".pdf,.doc,.docx" onchange="handleResumeSelect(event)">
          <svg style="width:48px;height:48px;margin:0 auto 0.5rem;color:#9ca3af;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
          <p style="color:#6b7280;font-weight:600;margin:0;">Click to upload resume</p>
          <p style="color:#9ca3af;font-size:0.85rem;margin-top:0.25rem;">PDF, DOC, or DOCX (max 5MB)</p>
          <div class="resume-filename" id="resume-filename">${p.resume_path ? '📄 ' + p.resume_path.split('/').pop() : ''}</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" id="save-btn" class="btn btn-primary">Save Profile</button>
      </div>
    </form>`;

  document.getElementById('profile-form').addEventListener('submit', saveProfile);
}

function renderEmployerForm(p) {
  document.getElementById('profile-form-container').innerHTML = `
    <form id="profile-form">
      <h3 style="font-size:1rem;font-weight:700;color:#374151;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid #f1f5f9;">Contact Information</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Your Name *</label>
          <input type="text" id="full_name" class="form-control" value="${p.full_name||''}" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" class="form-control" value="${p.phone||''}" placeholder="+91 …">
        </div>
      </div>

      <h3 style="font-size:1rem;font-weight:700;color:#374151;margin:1.5rem 0 1.25rem;padding-bottom:0.75rem;border-bottom:1px solid #f1f5f9;">Company Information</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Company Name *</label>
          <input type="text" id="company_name" class="form-control" value="${p.company_name||''}" required>
        </div>
        <div class="form-group">
          <label>Industry</label>
          <input type="text" id="industry" class="form-control" value="${p.industry||''}" placeholder="e.g. Software, Healthcare">
        </div>
      </div>
      <div class="form-group">
        <label>Company Website</label>
        <input type="url" id="company_website" class="form-control" value="${p.company_website||''}" placeholder="https://yourcompany.com">
      </div>
      <div class="form-group">
        <label>Company Address</label>
        <input type="text" id="company_address" class="form-control" value="${p.company_address||''}" placeholder="Full address">
      </div>
      <div class="form-group">
        <label>Company Description</label>
        <textarea id="company_description" class="form-control" rows="4" placeholder="Tell job seekers about your company, culture, and mission…">${p.company_description||''}</textarea>
      </div>
      <div class="form-actions">
        <button type="submit" id="save-btn" class="btn btn-primary">Save Profile</button>
      </div>
    </form>`;

  document.getElementById('profile-form').addEventListener('submit', saveProfile);
}

let selectedResumeFile = null;

function handleResumeSelect(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Validate file size (5MB max)
  if (file.size > 5 * 1024 * 1024) {
    UI.toast('File too large. Max size is 5MB.', 'error');
    event.target.value = '';
    return;
  }

  // Validate file type
  const allowed = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
  if (!allowed.includes(file.type)) {
    UI.toast('Invalid file type. Only PDF, DOC, DOCX allowed.', 'error');
    event.target.value = '';
    return;
  }

  selectedResumeFile = file;
  document.getElementById('resume-filename').textContent = '📄 ' + file.name;
}

async function saveProfile(e) {
  e.preventDefault();
  UI.setLoading('save-btn', true);

  const fields = ['full_name','phone','location','experience_years','education','skills','bio',
                   'company_name','industry','company_website','company_address','company_description'];
  const data = {};
  fields.forEach(f => {
    const el = document.getElementById(f);
    if (el) data[f] = el.value.trim();
  });

  // If resume file selected, convert to base64
  if (selectedResumeFile) {
    const base64 = await fileToBase64(selectedResumeFile);
    data.resume = {
      name: selectedResumeFile.name,
      data: base64,
      type: selectedResumeFile.type
    };
  }

  const result = await API.updateProfile(data);
  UI.setLoading('save-btn', false);

  if (result.success) {
    UI.toast('Profile updated successfully! ✅', 'success');
    selectedResumeFile = null;
    loadProfile();
  } else {
    UI.toast(result.error || 'Failed to update profile', 'error');
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

loadProfile();
</script>
</body>
</html>
