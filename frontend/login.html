<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Job Portal</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">JP</div>
                Job Portal
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html" class="btn btn-primary">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- LOGIN FORM -->
    <div class="form-container">
        <div class="form-header">
            <h2>Welcome Back</h2>
            <p>Login to access your account</p>
        </div>

        <div id="message-container"></div>

        <form id="login-form">
            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="your.email@example.com" required autofocus>
                <div id="email-error" class="error-message"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                <div id="password-error" class="error-message"></div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                Login
            </button>

            <!-- Register Link -->
            <p class="text-center mt-3" style="color: var(--text-secondary);">
                Don't have an account? 
                <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Create one now</a>
            </p>
        </form>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Job Portal - AMDOX Internship Project</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
